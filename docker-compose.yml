version: '3.8'

services:
  miaomiaowu:
    image: ghcr.io/iluobei/miaomiaowuX:latest
    container_name: miaomiaowuX
    restart: unless-stopped
    # host 模式:妙妙屋X 要管 ACME 80/443、嵌入式 nginx/xray 多端口、agent 反向连接,
    # bridge 模式得为每个端口 -p 映射,新增端口又得改 compose;host 直接共享宿主网络栈最省心。
    network_mode: host
    environment:
      - PORT=12889
      - DATABASE_PATH=/app/data/mmwx.db
      - LOG_LEVEL=info

    volumes:
      - ./data:/app/data
      # subscribes 必须挂出来:Dockerfile 里 VOLUME 声明了 /app/subscribes,不做 bind mount
      # 就会落到**匿名卷**上 —— 容器重建时换一个新匿名卷,用户的订阅文件全部丢失。
      - ./subscribes:/app/subscribes
      - ./rule_templates:/app/rule_templates
      # 让容器继承宿主时区,否则进程按 UTC 运行,「每日流量通知」等按本地时间的功能会差 8 小时
      - /etc/localtime:/etc/localtime:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12889/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
